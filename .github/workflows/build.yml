name: Build FLIMKit App

on:
  push:
    tags:
      - "v*"          # trigger on version tags like v1.0.0
  workflow_dispatch:  # also allow manual trigger from GitHub UI
    inputs:
      publish_release:
        description: "Publish artifacts to a GitHub Release"
        required: false
        default: "true"
      release_tag:
        description: "Release tag to create/update when publish_release=true (e.g. v1.0.0). If empty, uses the pushed tag if triggered by a tag push."
        required: false
        default: ""

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: FLIMKit-linux
          - os: windows-latest
            artifact_name: FLIMKit-windows
          - os: macos-latest
            artifact_name: FLIMKit-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify Python version
        run: |
          python -c "import sys; print('Python:', sys.version)"
          python -c "import sys; raise SystemExit(0 if sys.version_info >= (3, 12) else 'Python >= 3.12 required for phasorpy==0.9')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      # tkinter is not bundled with the GitHub Actions Python on macOS or Linux
      - name: Install tkinter + libGL (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk libgl1

      - name: Install tkinter (macOS)
        if: runner.os == 'macOS'
        run: brew install python-tk@3.13

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --name FLIMKit
          --windowed
          --onefile
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --hidden-import PIL
          --add-data "flimkit:flimkit"
          --add-data "flimkit/icon.png:flimkit"
          gui.py

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/FLIMKit.app dist/FLIMKit-macos.zip

      - name: Upload artifact (macOS .app)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/FLIMKit-macos.zip
          retention-days: 30

      - name: Upload artifact (Linux / Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 30

  # Optional: create a GitHub Release and attach the zipped builds when a tag is pushed
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release archives
        run: |
          mkdir -p release
          cd artifacts
          for d in */; do
            if ls "$d"*.zip >/dev/null 2>&1; then
              cp "$d"*.zip ../release/
            else
              zip -r "../release/${d%/}.zip" "$d"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          files: release/*.zip
