# pytest configuration for FLIM pipeline tests

[tool:pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 6.0

# Add current directory to path
pythonpath = .

# Output options
addopts = 
    --strict-markers
    --tb=short
    -ra
    --color=yes

# Test markers
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for complete workflows
    slow: Tests that take a long time to run
    requires_data: Tests that require real microscopy data

# Coverage options
[coverage:run]
source = pyflim
omit = 
    */tests/*
    */mock_data.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
